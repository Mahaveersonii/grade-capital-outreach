name: Grade Capital Daily Outreach

on:
  schedule:
    # Runs at 04:00 UTC = 09:30 AM IST every day
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Also allows manual "Run workflow" trigger from GitHub UI

jobs:
  outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write   # needed to commit the updated sent_log.csv back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run outreach script
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          SERPER_API_KEY:  ${{ secrets.SERPER_API_KEY }}
          SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
        run: python outreach.py

      - name: Commit updated sent log
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "GitHub Actions"
          git add sent_log.csv
          git diff --staged --quiet || git commit -m "chore: update sent_log $(date +'%Y-%m-%d')"
          git push
